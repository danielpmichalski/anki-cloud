services:
  anki-sync-server:
    image: ghcr.io/danielpmichalski/anki-cloud-sync:v25.09-r1
    ports:
      - "8080:8080"
    environment:
      SYNC_BASE: /data
      DATABASE_URL: file:/data/anki-cloud.db
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SYNC_INTERNAL_PORT: 8081
      SYNC_INTERNAL_TOKEN: ${SIDECAR_TOKEN}
    volumes:
      - app-data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/data/anki-cloud.db
      SIDECAR_URL: http://anki-sync-server:8081
      SIDECAR_TOKEN: ${SIDECAR_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_DRIVE_REDIRECT_URI: ${GOOGLE_DRIVE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - app-data:/data
    depends_on:
      - anki-sync-server

volumes:
  app-data:
