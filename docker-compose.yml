services:
  anki-sync-server:
    image: ghcr.io/danielpmichalski/anki-cloud-sync:v25.09-r6
    #    image: anki-sync-server:local
    #    pull_policy: never
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      SYNC_BASE: /data
      SYNC_INTERNAL_PORT: 8081
      SYNC_INTERNAL_HOST: 0.0.0.0
      SYNC_INTERNAL_TOKEN: ${SIDECAR_TOKEN}
    volumes:
      - app-data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/data/anki-cloud.db
      SIDECAR_URL: http://anki-sync-server:8081
      SIDECAR_TOKEN: ${SIDECAR_TOKEN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_DRIVE_REDIRECT_URI: ${GOOGLE_DRIVE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
    volumes:
      - app-data:/data
    depends_on:
      - anki-sync-server

volumes:
  app-data:
