services:
  anki-sync-server:
    build: ./anki-sync-server
    ports:
      - "8080:8080"
    environment:
      SYNC_BASE: /data
      DATABASE_URL: file:/data/anki-cloud.db
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - app-data:/data

volumes:
  app-data:
